<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collatz Explorer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Collatz Explorer</h1>
        <p class="subtitle">Stopping time research tool</p>
      </header>

      <section id="controls">
        <div class="control-group">
          <label>Start <input id="input-start" type="number" value="1" min="1" /></label>
          <label>End <input id="input-end" type="number" value="10000" min="2" /></label>
          <label>Buckets (density) <input id="input-buckets" type="number" value="200" min="10" /></label>
        </div>
        <div class="button-group">
          <button id="btn-scatter">Scatter Plot</button>
          <button id="btn-density">Density View</button>
          <button id="btn-export-png">Export PNG</button>
          <button id="btn-export-csv">Export CSV</button>
        </div>
        <div id="status"></div>
      </section>

      <section id="chart-container">
        <canvas id="main-canvas"></canvas>
        <div id="tooltip"></div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
